name: Daily Contribution

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update contribution file
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "- Daily contribution: $DATE" >> CONTRIBUTIONS.md

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daily contribution update - $(date +%Y-%m-%d)"
          file_pattern: "CONTRIBUTIONS.md"
